<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --teal: #1a8a8a; --text: #1a1a1a; --muted: #5a5a5a; }
    body { margin: 0; min-height: 100vh; font-family: Inter, system-ui, sans-serif; color: var(--text);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      background: #f8f9f9; text-align: center; }
    .card { max-width: 420px; background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h1 { font-family: Montserrat, sans-serif; font-size: 1.35rem; margin: 0 0 12px; }
    p { color: var(--muted); line-height: 1.5; margin: 0 0 24px; }
    a { color: var(--teal); font-weight: 600; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Оплата не завершена</h1>
    <p>Вы отменили оплату или произошла ошибка. Попробуйте снова с главной страницы.</p>
    <p><a href="index.html">На главную</a></p>
  </div>
</body>
</html>
