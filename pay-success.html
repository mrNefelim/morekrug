<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Оплата прошла успешно</title>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@600;700&family=Inter:wght@400;500&display=swap" rel="stylesheet">
  <style>
    :root { --teal: #1a8a8a; --teal-light: #3ecece; --text: #1a1a1a; --muted: #5a5a5a; }
    body { margin: 0; min-height: 100vh; font-family: Inter, system-ui, sans-serif; color: var(--text);
      display: flex; align-items: center; justify-content: center; padding: 24px;
      background: linear-gradient(135deg, rgba(26,138,138,0.08) 0%, rgba(62,206,206,0.12) 100%); text-align: center; }
    .card { max-width: 420px; background: #fff; border-radius: 12px; padding: 32px; box-shadow: 0 4px 24px rgba(0,0,0,0.08); }
    h1 { font-family: Montserrat, sans-serif; font-size: 1.35rem; margin: 0 0 12px; color: var(--teal); }
    p { color: var(--muted); line-height: 1.5; margin: 0 0 24px; }
    a { display: inline-block; padding: 12px 24px; background: linear-gradient(135deg, var(--teal), var(--teal-light)); color: #fff;
      text-decoration: none; border-radius: 12px; font-weight: 600; font-family: Montserrat, sans-serif; }
  </style>
</head>
<body>
  <div class="card">
    <h1>Спасибо!</h1>
    <p>Оплата принята. Доступ к тарифу «Круги» будет выдан по указанному email.</p>
    <a href="index.html">На главную</a>
  </div>
</body>
</html>
